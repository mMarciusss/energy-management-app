name: Android CI/CD

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x gradlew

      - name: Set versionCode
        run: echo "VERSION_CODE=$GITHUB_RUN_NUMBER" >> $GITHUB_ENV

      - name: Create google-services.json
        run: |
          printf "%s" '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - run: ./gradlew build --stacktrace --info

      - name: Deploy to Firebase
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew assembleDebug appDistributionUploadDebug
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_RELEASE_NOTES: "Build ${{ github.run_number }} from ${{ github.ref_name }}"