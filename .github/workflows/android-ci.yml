name: Android CI

on:
  push:
    branches:
      - '**'

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      -uses: actions/checkout@v4

      -uses: actions/setup-java@v4
       with:
         distribution: temurin
         java-version: 17

      -uses: gradle/actions/setup-gradle@v4

      -run: chmod +x gradlew
      -run: ./gradlew build